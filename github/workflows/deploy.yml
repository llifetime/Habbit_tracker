name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: habit_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: Lifetime
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 coverage

    - name: Run flake8
      run: flake8 --exclude=migrations --max-line-length=120 apps/ config/

    - name: Run tests with coverage
      env:
        DB_NAME: habit_db
        DB_USER: admin
        DB_PASSWORD: Lifetime
        DB_HOST: localhost
        DB_PORT: 5432
        DEBUG: 'True'
      run: |
        coverage run --source='apps' manage.py test apps.habits.tests
        coverage report --fail-under=80

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: .coverage

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Django image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        load: true
        tags: habit-tracker-web:latest

    - name: Build Nginx image
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: false
        load: true
        tags: habit-tracker-nginx:latest

    - name: Test Docker Compose build
      run: docker compose -f docker-compose.yml config

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v3

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: Copy files to server
      run: |
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='.env' \
          --exclude='venv' \
          --exclude='.venv' \
          --exclude='static' \
          --exclude='media' \
          ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/habit-tracker/

    - name: Create .env file on server
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd ~/habit-tracker
          cat > .env.prod << 'ENV'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.SERVER_HOST }}
          DB_NAME=habit_db
          DB_USER=admin
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          ENV
        EOF

    - name: Deploy with Docker Compose
      run: |
        ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd ~/habit-tracker
          docker compose -f docker-compose.prod.yml down
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
          docker system prune -f
        EOF

    - name: Health check
      run: |
        sleep 30
        curl -f http://${{ secrets.SERVER_HOST }}/api/habits/public/ || exit 1